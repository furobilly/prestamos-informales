<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Plan de Liquidación · Préstamos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',system-ui,sans-serif;background:#f5f7fb;color:#0f172a;font-size:14px;max-width:1400px;margin:0 auto;padding:0 24px;-webkit-font-smoothing:antialiased}

/* ── PIN SCREEN ── */
#pin-screen{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;
  background:radial-gradient(120% 60% at 50% -10%,rgba(96,165,250,.18) 0%,rgba(96,165,250,0) 55%),radial-gradient(80% 50% at 50% 110%,rgba(30,58,95,.6) 0%,rgba(15,29,48,0) 70%),#1e3a5f;
  color:#f8fafc;font-family:'Manrope',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.pin-card{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;padding:36px 28px 28px;border-radius:24px;
  background:linear-gradient(180deg,rgba(255,255,255,.05) 0%,rgba(255,255,255,.02) 100%);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 1px 0 rgba(255,255,255,.06) inset,0 30px 60px -20px rgba(0,0,0,.5),0 0 0 1px rgba(0,0,0,.1);
  backdrop-filter:blur(8px)}
.pin-badge{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;margin-bottom:18px;
  background:linear-gradient(180deg,rgba(96,165,250,.22),rgba(96,165,250,.06));
  border:1px solid rgba(147,197,253,.25);box-shadow:0 8px 24px -8px rgba(96,165,250,.4)}
.pin-badge svg{width:24px;height:24px;color:#bfdbfe}
.pin-title{font-size:20px;font-weight:700;letter-spacing:-.01em;color:#fff;margin:0 0 6px;text-align:center}
#pin-sub{font-size:13.5px;font-weight:500;color:#93c5fd;margin:0 0 24px;text-align:center;opacity:.85}
#pin-dots{display:flex;gap:16px;margin:4px 0 28px}
#pin-dots>div{width:14px;height:14px;border-radius:50%;background:transparent;border:1.5px solid rgba(147,197,253,.45);transition:all 220ms cubic-bezier(.2,.8,.2,1)}
#pin-dots>div.filled{background:#60a5fa;border-color:#60a5fa;transform:scale(1.15);box-shadow:0 0 0 4px rgba(96,165,250,.12),0 0 18px rgba(96,165,250,.55)}
#pin-dots.error>div{border-color:#f87171;background:rgba(248,113,113,.12);animation:pin-shake 420ms cubic-bezier(.36,.07,.19,.97)}
@keyframes pin-shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(3px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
#pin-grid{display:grid;grid-template-columns:repeat(3,72px);gap:14px;margin:4px 0 18px}
.pkey{width:72px;height:72px;border-radius:50%;border:1px solid rgba(255,255,255,.10);
  background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,rgba(255,255,255,.02) 100%),rgba(15,29,48,.4);
  color:#f8fafc;font-family:'Manrope',system-ui,sans-serif;font-size:26px;font-weight:500;cursor:pointer;
  display:grid;place-items:center;transition:transform 120ms ease,background 160ms ease,border-color 160ms ease,box-shadow 160ms ease;
  box-shadow:0 1px 0 rgba(255,255,255,.08) inset,0 4px 12px -4px rgba(0,0,0,.4);user-select:none}
.pkey:hover{background:linear-gradient(180deg,rgba(255,255,255,.14) 0%,rgba(255,255,255,.04) 100%),rgba(15,29,48,.4);border-color:rgba(147,197,253,.35)}
.pkey:active{transform:scale(.94);background:rgba(96,165,250,.22);border-color:rgba(96,165,250,.6)}
.pkey--back{background:transparent;border-color:rgba(255,255,255,.06);color:#93c5fd;box-shadow:none;font-size:20px}
.pkey--back:hover{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.35);color:#fca5a5}
.pkey--spacer{opacity:0;pointer-events:none;background:transparent;border:none;box-shadow:none}
#pin-err{color:#fca5a5;font-size:12.5px;font-weight:500;min-height:18px;margin-top:4px;text-align:center}
.pin-footer{margin-top:22px;color:#93c5fd;font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;opacity:.55;text-align:center}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;gap:24px;padding:18px 28px;
  background:radial-gradient(140% 120% at 0% 0%,rgba(96,165,250,.18) 0%,rgba(96,165,250,0) 50%),linear-gradient(180deg,#224775 0%,#1e3a5f 100%);
  border-bottom:1px solid rgba(255,255,255,.08);
  box-shadow:0 1px 0 rgba(255,255,255,.06) inset,0 8px 24px -16px rgba(0,0,0,.6);
  color:#f8fafc}
.hdr-h1{font-size:16px!important;font-weight:700!important;letter-spacing:-.01em;color:#fff;margin:0 0 4px;display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:12.5px;font-weight:500;color:#93c5fd;letter-spacing:.01em;opacity:.85}
.clock{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#bfdbfe;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:999px;padding:6px 12px}
.hdr button{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.04))!important;border:1px solid rgba(255,255,255,.18)!important;color:#f8fafc!important;font-family:'Manrope',system-ui,sans-serif!important;font-size:12.5px!important;font-weight:600!important;border-radius:10px!important;padding:8px 14px!important;cursor:pointer;transition:transform 120ms,background 160ms,border-color 160ms;box-shadow:0 1px 0 rgba(255,255,255,.08) inset,0 4px 12px -6px rgba(0,0,0,.4)}
.hdr button:hover{background:linear-gradient(180deg,rgba(248,113,113,.18),rgba(248,113,113,.06))!important;border-color:rgba(248,113,113,.45)!important;color:#fecaca!important}
.hdr button:active{transform:scale(.97)}

/* ── CARDS ── */
.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;padding:20px 28px;background:#f5f7fb;font-family:'Manrope',system-ui,sans-serif}
.card{--accent:#2563eb;--accent-soft:rgba(37,99,235,.10);position:relative;display:flex;flex-direction:column;gap:6px;padding:18px;background:#fff;border:1px solid #e6ecf3;border-radius:16px;overflow:hidden;transition:transform 160ms cubic-bezier(.2,.8,.2,1),box-shadow 160ms,border-color 160ms;
  box-shadow:0 1px 0 rgba(255,255,255,.8) inset,0 1px 2px rgba(15,23,42,.04),0 8px 24px -16px rgba(15,23,42,.18)}
.card:hover{transform:translateY(-2px);box-shadow:0 1px 0 rgba(255,255,255,.8) inset,0 16px 32px -18px rgba(15,23,42,.25)}
.card::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:0 3px 3px 0;background:var(--accent)}
.card::after{content:"";position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(closest-side,var(--accent-soft),transparent 70%);pointer-events:none}
.clabel{position:relative;display:flex;align-items:center;gap:10px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#64748b}
.clabel::before{content:"";width:28px;height:28px;border-radius:8px;background-color:var(--accent-soft);border:1px solid color-mix(in oklab,var(--accent) 22%,transparent);flex-shrink:0;background-repeat:no-repeat;background-position:center;background-size:16px 16px}
.cval{font-size:28px!important;font-weight:800;letter-spacing:-.02em;line-height:1.1;color:var(--accent)!important;font-variant-numeric:tabular-nums;margin:2px 0 4px}
.csub{font-size:12px;font-weight:500;color:#64748b;line-height:1.45}
.card.c-blue{--accent:#2563eb;--accent-soft:rgba(37,99,235,.10)}
.card.c-blue .clabel::before{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='6' width='18' height='13' rx='2'/><path d='M3 10h18'/><circle cx='8' cy='14.5' r='1.2' fill='%232563eb' stroke='none'/></svg>")}
.card.c-red{--accent:#dc2626;--accent-soft:rgba(220,38,38,.10)}
.card.c-red .clabel::before{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23dc2626' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><polyline points='3 17 9 11 13 15 21 7'/><polyline points='14 7 21 7 21 14'/></svg>")}
.card.c-green{--accent:#16a34a;--accent-soft:rgba(22,163,74,.10)}
.card.c-green .clabel::before{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2316a34a' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='5' width='18' height='16' rx='2'/><path d='M3 10h18'/><path d='M8 3v4M16 3v4'/><path d='M9 15l2 2 4-4'/></svg>")}
.card.c-amber{--accent:#d97706;--accent-soft:rgba(217,119,6,.10)}
.card.c-amber .clabel::before{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d97706' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2v20M17 6H9.5a3.5 3.5 0 0 0 0 7H14.5a3.5 3.5 0 0 1 0 7H6'/></svg>")}
.card.c-purple{--accent:#7c3aed;--accent-soft:rgba(124,58,237,.10)}
.card.c-purple .clabel::before{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c3aed' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><path d='M20 7H7a3 3 0 0 0 0 6h10a3 3 0 0 1 0 6H4'/><path d='M20 7l-3-3M20 7l-3 3'/></svg>")}
.card.c-amber .csub[style*="16a34a"]{display:inline-flex;align-items:center;gap:4px;margin-top:8px!important;padding:4px 8px;background:rgba(22,163,74,.10);color:#15803d!important;border-radius:999px;font-size:11px!important;font-weight:600!important;width:fit-content}

/* ── PANELS ── */
.panels{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0 0 12px}
.panel{position:relative;background:#fff;border:1px solid #e6ecf3;border-radius:18px;padding:18px 18px 14px;
  box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 1px 2px rgba(15,23,42,.04),0 12px 30px -18px rgba(15,23,42,.22);
  font-family:'Manrope',system-ui,sans-serif;color:#0f172a;overflow:hidden}
.panel::before{content:"";position:absolute;top:0;left:0;right:0;height:60px;background:radial-gradient(80% 100% at 50% -30%,rgba(37,99,235,.08),transparent 70%);pointer-events:none}
.panel h3{position:relative;display:flex;align-items:center;gap:10px;margin:0 0 14px;font-size:14.5px;font-weight:700;letter-spacing:-.01em;color:#0f172a}
.panel .btn-sm{display:inline-flex;align-items:center;gap:6px;font-family:'Manrope',system-ui,sans-serif!important;font-size:12px!important;font-weight:600!important;border-radius:10px!important;padding:7px 12px!important;cursor:pointer;transition:transform 120ms,background 160ms,border-color 160ms,color 160ms}
.panel .btn-s{background:#fff!important;color:#b91c1c!important;border:1px solid #fecaca!important}
.panel .btn-s:hover{background:#fef2f2!important;border-color:#fca5a5!important}
.panel .btn-p{background:linear-gradient(180deg,#2f74f1 0%,#2563eb 100%)!important;color:#fff!important;border:1px solid #1d4ed8!important;box-shadow:0 1px 0 rgba(255,255,255,.28) inset,0 6px 14px -6px rgba(37,99,235,.55)}
.panel .btn-p:hover{background:linear-gradient(180deg,#3b82f6 0%,#2563eb 100%)!important}
.panel .btn-p:active,.panel .btn-s:active{transform:scale(.97)}
.panel .chip{display:inline-flex;align-items:center;gap:5px;background:#eef4ff;color:#1d4ed8;border:1px solid #dbe7ff;border-radius:999px;padding:2px 8px;font-size:10.5px;font-weight:700;letter-spacing:.02em}
.panel .chip .dot{width:5px;height:5px;border-radius:50%;background:#2563eb}
.panel .badge-tip{margin-left:auto;display:inline-flex;align-items:center;gap:5px;background:#ecfdf5;color:#15803d;border:1px solid #d1fae5;border-radius:999px;padding:2px 8px;font-size:10.5px;font-weight:700;letter-spacing:.02em}
.panel .badge-tip::before{content:"";width:5px;height:5px;border-radius:50%;background:#16a34a;box-shadow:0 0 0 3px rgba(22,163,74,.18)}
.panel .meta{margin-left:auto;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#94a3b8}
/* badge estatus notas */
.panel span[style*="background:#fef9c3"]{display:inline-flex!important;align-items:center;gap:5px;background:linear-gradient(180deg,rgba(217,119,6,.14),rgba(217,119,6,.06))!important;color:#b45309!important;border:1px solid rgba(217,119,6,.30);border-radius:999px!important;padding:3px 9px 3px 7px!important;font-size:10px!important;font-weight:700!important;box-shadow:0 1px 2px rgba(217,119,6,.10)}
.panel span[style*="background:#fef9c3"]::before{content:"";width:6px;height:6px;border-radius:50%;background:#d97706;box-shadow:0 0 0 3px rgba(217,119,6,.18);animation:dot-pulse 1.6s ease-in-out infinite}
@keyframes dot-pulse{0%,100%{box-shadow:0 0 0 3px rgba(217,119,6,.18)}50%{box-shadow:0 0 0 6px rgba(217,119,6,0)}}
.panel span[style*="background:#dcfce7"]{display:inline-flex!important;align-items:center;gap:5px;background:linear-gradient(180deg,rgba(22,163,74,.14),rgba(22,163,74,.06))!important;color:#15803d!important;border:1px solid rgba(22,163,74,.30);border-radius:999px!important;padding:3px 9px!important;font-size:10px!important;font-weight:700!important}
/* número nota circular */
.panel span[style*="background:#dbeafe"]{width:28px!important;height:28px!important;background:linear-gradient(180deg,#60a5fa 0%,#2563eb 100%)!important;color:#fff!important;border-radius:50%!important;display:inline-grid!important;place-items:center!important;font-size:11.5px!important;font-weight:800!important;padding:0!important;box-shadow:0 1px 0 rgba(255,255,255,.4) inset,0 4px 10px -3px rgba(37,99,235,.6),0 0 0 4px rgba(37,99,235,.10);justify-self:center}
/* botón ✕ nota */
.panel button[onclick^="removeNota"]{width:22px!important;height:22px!important;border-radius:7px!important;color:#94a3b8!important;background:transparent!important;border:1px solid transparent!important;display:inline-grid;place-items:center;font-size:12px!important;cursor:pointer;transition:all 140ms;padding:0!important;opacity:.6}
.panel button[onclick^="removeNota"]:hover{opacity:1;background:rgba(220,38,38,.08)!important;color:#dc2626!important;border-color:rgba(220,38,38,.25)!important;transform:rotate(90deg)}
/* footer totales notas */
.panel-foot{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;padding:12px;background:linear-gradient(180deg,#f8fafc 0%,#fff 100%);border:1px solid #eef2f7;border-radius:12px}
.panel-foot .ft{display:flex;flex-direction:column;gap:2px;padding:4px 8px;border-left:2px solid #e2e8f0}
.panel-foot .ft .k{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8}
.panel-foot .ft .v{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:14px;font-weight:700;color:#0f172a;font-variant-numeric:tabular-nums}
.panel-foot .ft.blue{border-color:#2563eb}
.panel-foot .ft.green{border-color:#16a34a}.panel-foot .ft.green .v{color:#15803d}
.panel-foot .ft.slate{border-color:#94a3b8}
/* mini barra segmentada pagos */
.pay-dots{display:inline-grid;grid-template-columns:repeat(var(--total,34),1fr);gap:2px;width:90px;height:6px;vertical-align:middle}
.pay-dots i{background:#e2e8f0;border-radius:1px}
.pay-dots i.on{background:linear-gradient(180deg,#60a5fa,#2563eb);box-shadow:0 0 4px rgba(37,99,235,.45)}
/* row-progress */
.row-progress{height:4px;background:#eef2f7;border-radius:999px;overflow:hidden;margin-top:5px}
.row-progress>i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,#60a5fa,#2563eb);box-shadow:0 0 8px rgba(37,99,235,.4)}
.row-progress.is-done>i{background:linear-gradient(90deg,#34d399,#16a34a)}
/* abono extra: select e input */
.panel #sel-mes{appearance:none;font-family:'Manrope',system-ui,sans-serif!important;font-size:13px!important;font-weight:600;color:#0f172a;background:#f8fafc;border:1px solid #e2e8f0!important;border-radius:10px;padding:10px 36px 10px 12px!important;width:100%;cursor:pointer;transition:border-color 140ms,box-shadow 140ms;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 12px center;background-size:14px 14px}
.panel #sel-mes:focus{outline:none;border-color:#60a5fa!important;box-shadow:0 0 0 3px rgba(96,165,250,.25)}
.panel #inp-libre{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:14px!important;font-weight:700;color:#0f172a;background:#f8fafc;border:1px solid #e2e8f0!important;border-radius:10px;padding:10px 12px 10px 28px!important;width:100%;transition:border-color 140ms,box-shadow 140ms;font-variant-numeric:tabular-nums}
.panel #inp-libre:focus{outline:none;border-color:#16a34a!important;box-shadow:0 0 0 3px rgba(22,163,74,.20)}
/* button Aplicar abono full-width */
.panel button.btn-p.btn-sm[onclick="addLibre()"]{width:100%;margin-top:6px;font-size:13.5px!important;font-weight:700!important;border-radius:12px!important;padding:12px 16px!important;justify-content:center;box-shadow:0 1px 0 rgba(255,255,255,.28) inset,0 8px 18px -6px rgba(37,99,235,.55)}
.panel button.btn-p.btn-sm[onclick="addLibre()"]:hover{transform:translateY(-1px);box-shadow:0 1px 0 rgba(255,255,255,.28) inset,0 14px 26px -8px rgba(37,99,235,.65)}

/* ── TABLA ── */
.tw{padding:0 0 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e2e8f0;font-size:12px}
thead th{background:#1e3a5f;color:#fff;padding:8px 10px;font-size:11px;font-weight:700;text-align:right;white-space:nowrap;position:sticky;top:0;letter-spacing:.04em}
thead th:first-child,thead th:nth-child(2){text-align:left}
tbody td{padding:6px 10px;text-align:right;white-space:nowrap;border-bottom:1px solid #f1f5f9;font-size:12px}
tbody td:first-child,tbody td:nth-child(2){text-align:left}
.col-fecha{width:90px}.col-pago{width:60px}.col-num{width:80px}.col-st{width:75px}
.yr-hdr{background:#1e3a5f;color:#93c5fd;font-size:11px;font-weight:700;letter-spacing:.10em;padding:6px 10px;text-transform:uppercase}
tr.paid td{background:#f0fdf4!important;color:#15803d}
tr.nxt td{background:#fffbeb!important;font-weight:600}
tr.totals td{background:#1e3a5f;color:#fff;font-weight:700}
.badge{border-radius:3px;padding:1px 5px;font-size:10px;margin-left:3px}
.bt{background:#dbeafe;color:#1e40af}
.ba{background:#d1fae5;color:#065f46}
.bl{background:#fce7f3;color:#9d174d}

/* ── MISC ── */
.alert{background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;margin:0 0 10px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:22px;width:340px;box-shadow:0 20px 40px -12px rgba(0,0,0,.25)}
.modal h3{margin-bottom:14px;font-size:15px;font-weight:700}
.modal .frow{flex-direction:column;align-items:flex-start;gap:3px;margin-bottom:10px}
.modal .frow label{font-size:12px;color:#475569}
.frow{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.frow label{font-size:11px;color:#64748b;white-space:nowrap;min-width:52px}
input[type=number],input[type=text],select{border:1px solid #cbd5e1;border-radius:8px;padding:7px 10px;font-size:13px;background:#fff;width:100%;font-family:'Manrope',system-ui,sans-serif}
input[type=number]:focus,input[type=text]:focus,select:focus{outline:none;border-color:#60a5fa;box-shadow:0 0 0 3px rgba(96,165,250,.25)}
.btn{border:none;border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;font-weight:600}
.btn-p{background:linear-gradient(180deg,#2f74f1,#2563eb);color:#fff;border:1px solid #1d4ed8;box-shadow:0 4px 10px -4px rgba(37,99,235,.5)}
.btn-p:hover{background:linear-gradient(180deg,#3b82f6,#2563eb)}
.btn-s{background:#fff;color:#374151;border:1px solid #d1d5db}.btn-s:hover{background:#f8fafc}
.btn-sm{padding:5px 11px;font-size:11px}

<script>
const MX_TZ = 'America/Mexico_City';
const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

const $ = id => document.getElementById(id);
const fmt = n => '$' + Math.round(n).toLocaleString('es-MX');
const fmtD = d => `01-${MONTHS[d.getMonth()]}-${d.getFullYear()}`;
const fmtDLong = d => d.toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'});

let S = {
  notas: [
    {id:1,nombre:'Nota 1',monto:30000,startMes:1},
    {id:2,nombre:'Nota 2',monto:15000,startMes:1},
    {id:3,nombre:'Nota 3',monto:6000,startMes:1},
  ],
  pagoFijo: 2550,
  trimBase: 1000,
  fechaInicio: new Date(2026,5,1),
  ov: {},   // {mes: {libre, trimestral, pagado}}
  nid: 4,
};

function calcular(){
  const notas = S.notas.map(n=>({...n,saldo:n.monto}));
  let fecha = new Date(S.fechaInicio);
  let aho = 0;
  const rows=[];

  for(let mes=1;mes<=720;mes++){
    const act = notas.filter(n=>n.saldo>0&&n.startMes<=mes);
    if(!act.length && mes>1) break;

    const deudaIni = act.reduce((s,n)=>s+n.saldo,0);
    const interes  = Math.round(deudaIni*0.05);
    const ahoMes   = Math.max(0, S.pagoFijo - interes);
    aho += ahoMes;
    const ahoDisp  = aho;

    let pxAhorro=0;
    if(aho>=1000){pxAhorro=Math.floor(aho/1000)*1000;aho%=1000;}

    const ov = S.ov[mes]||{};
    const trim = mes%3===0 ? (ov.trimestral!==undefined?ov.trimestral:S.trimBase) : 0;
    const libre = ov.libre||0;
    const abono = trim+libre+pxAhorro;

    if(abono>0){
      const sorted=[...act].sort((a,b)=>a.saldo-b.saldo);
      let rem=abono;
      for(const n of sorted){
        if(rem<=0)break;
        const idx=notas.findIndex(x=>x.id===n.id);
        const p=Math.min(rem,notas[idx].saldo);
        notas[idx].saldo-=p; rem-=p;
      }
    }

    const deudaFin = notas.reduce((s,n)=>s+n.saldo,0);
    rows.push({mes,fecha:new Date(fecha),deudaIni,interes,trim,libre,pxAhorro,ahoMes,ahoDisp,abono,deudaFin,pagado:ov.pagado||false,notasSaldo:notas.map(n=>({...n}))});
    if(deudaFin<=0)break;
    fecha=new Date(fecha.getFullYear(),fecha.getMonth()+1,1);
  }
  return rows;
}

function getNextPayIdx(rows){
  const mxNow = new Date(new Date().toLocaleString('en-US',{timeZone:MX_TZ}));
  return rows.findIndex(r=>!r.pagado&&(r.fecha.getFullYear()>mxNow.getFullYear()||(r.fecha.getFullYear()===mxNow.getFullYear()&&r.fecha.getMonth()>=mxNow.getMonth())));
}

function render(){
  const rows = calcular();
  const nxt  = getNextPayIdx(rows);
  const last = rows[rows.length-1];
  const cur  = rows[nxt]||rows[0];

  const totInt   = rows.reduce((s,r)=>s+r.interes,0);
  const totTrim  = rows.reduce((s,r)=>s+r.trim,0);
  const totAho   = rows.reduce((s,r)=>s+r.pxAhorro,0);
  const totLibre = rows.reduce((s,r)=>s+r.libre,0);
  const totCap   = totTrim+totAho+totLibre;
  const totDes   = rows.reduce((s,r)=>s+S.pagoFijo+r.trim+r.libre,0);
  const nmeses   = rows.length;
  const anios    = Math.floor(nmeses/12), mResto=nmeses%12;
  const pagosHechos = rows.filter(r=>r.pagado);
  const intPagadoHoy = pagosHechos.reduce((s,r)=>s+r.interes,0);
  const nPagados = pagosHechos.length;
  const deudaInicial = S.notas.reduce((s,n)=>s+n.monto,0);
  const lastPaidRow = [...rows].reverse().find(r=>r.pagado);
  const getRealSaldo = id=>{
    if(lastPaidRow) return (lastPaidRow.notasSaldo.find(x=>x.id===id)||{saldo:0}).saldo;
    return S.notas.find(n=>n.id===id)?.monto||0;
  };

  // Deficit check
  const deficit = cur && S.pagoFijo < cur.interes;

  const nowStr = new Date().toLocaleString('es-MX',{timeZone:MX_TZ,day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const yBg  = ['#eff6ff','#f0fdf4','#fffbeb','#fdf4ff','#fff1f2','#f0f9ff'];

  let h=`

    <div style="display:flex;align-items:center;gap:14px">
      <div class="clock" id="clock">🇲🇽 ${nowStr}</div>
      <button onclick="cerrarSesion()" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer">🔒 Salir</button>
    </div>
  </div>

  ${deficit?`<div class="alert">⚠️ <b>Pago fijo insuficiente.</b> El interés actual es ${fmt(cur.interes)} pero tu pago fijo es ${fmt(S.pagoFijo)}. Déficit: ${fmt(cur.interes-S.pagoFijo)}/mes. Aumenta el pago fijo o abona capital.</div>`:''}

  <div class="cards">
    <div class="card c-blue"><div class="clabel">Deuda total</div><div class="cval" style="color:#2563eb">${fmt(cur?cur.deudaIni:0)}</div><div class="csub">${S.notas.length} nota${S.notas.length>1?'s':''}</div></div>
    <div class="card c-red"><div class="clabel">Interés este mes</div><div class="cval" style="color:#dc2626">${fmt(cur?cur.interes:0)}</div><div class="csub">Próximo pago: ${cur?fmtD(cur.fecha):'—'}</div></div>
    <div class="card c-green"><div class="clabel">Liquidación estimada</div><div class="cval" style="font-size:1rem;color:#16a34a">${last?fmtDLong(last.fecha):'—'}</div><div class="csub">${anios?anios+' año'+(anios>1?'s':''):''} ${mResto?mResto+' mes'+(mResto>1?'es':''):''} · ${nmeses} pagos total</div></div>
    <div class="card c-amber"><div class="clabel">Total intereses proyectados</div><div class="cval" style="font-size:1rem;color:#d97706">${fmt(totInt)}</div><div class="csub">Deuda inicial: ${fmt(deudaInicial)}</div><div class="csub" style="color:#16a34a;font-size:11px;margin-top:4px">💡 Más que abones, menos pagas</div></div>
    <div class="card c-purple"><div class="clabel">Intereses pagados a la fecha</div><div class="cval" style="font-size:1rem;color:#7c3aed">${fmt(intPagadoHoy)}</div><div class="csub">${nPagados} pago${nPagados!==1?'s':''} realizados</div></div>
  </div>

  <div class="panels">
    <div class="panel">
      <h3>📄 Notas activas <span class="chip"><span class="dot"></span>${S.notas.filter(n=>getRealSaldo(n.id)>0).length} abiertas</span><span style="margin-left:auto;display:flex;gap:8px"><button class="btn btn-s btn-sm" onclick="reiniciar()">🔄 Reiniciar</button><button class="btn btn-p btn-sm" onclick="openModal()">+ Agregar nota</button></span></h3>
      <div style="font-size:11px;color:#64748b;margin-bottom:8px;display:flex;gap:12px;flex-wrap:wrap">
        <span>Pago fijo: <input type="number" value="${S.pagoFijo}" step="50" style="width:80px;display:inline-block;padding:3px 6px;font-size:12px" onchange="S.pagoFijo=+this.value;render()"></span>
        <span>Trimestral: <input type="number" value="${S.trimBase}" step="1000" min="0" style="width:72px;display:inline-block;padding:3px 6px;font-size:12px" onchange="S.trimBase=+this.value;render()"></span>
      </div>
      <div style="display:grid;grid-template-columns:28px 1fr 82px 74px 74px 74px 72px;gap:4px;padding:3px 0 5px;font-size:10px;color:#94a3b8;font-weight:600;border-bottom:1px solid #e2e8f0;margin-bottom:2px;text-align:right">
        <span style="text-align:center">#</span><span style="text-align:left">Nota</span><span>Solicitado</span><span>F. Sol.</span><span>Saldo real</span><span>F. Liquidación</span><span>Estatus</span>
      </div>
      ${S.notas.map(n=>{
        const realSaldo = getRealSaldo(n.id);
        const isPagada = realSaldo===0;
        const isPendiente = n.startMes > (nxt+1);
        const stLabel = isPagada?'✓ Pagada':isPendiente?'Pendiente':'En proceso';
        const stColor = isPagada?'#dcfce7':isPendiente?'#fee2e2':'#fef9c3';
        const stTxt   = isPagada?'#15803d':isPendiente?'#dc2626':'#92400e';
        const fiqRow  = rows.find(r=>r.notasSaldo.find(x=>x.id===n.id&&x.saldo===0));
        const fLiq    = fiqRow?fmtD(fiqRow.fecha):'—';
        return `<div style="display:grid;grid-template-columns:28px 1fr 82px 74px 74px 74px 72px;align-items:center;gap:4px;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:12px;text-align:right">
          <span style="background:#dbeafe;color:#1d4ed8;border-radius:4px;padding:2px 0;font-size:10px;font-weight:700;text-align:center">${n.id}</span>
          <span style="font-weight:500;text-align:left">${n.nombre}</span>
          <span style="color:#64748b">${fmt(n.monto)}</span>
          <span style="font-size:10px;color:#94a3b8">${n.fechaSol||'—'}</span>
          <span style="font-weight:700;color:${isPagada?'#15803d':'#0f172a'}">${isPagada?'$0':fmt(realSaldo)}</span>
          <span style="font-size:10px;color:${isPagada?'#15803d':'#94a3b8'}">${fLiq}</span>
          <span style="display:flex;align-items:center;justify-content:space-between">
            <span style="background:${stColor};color:${stTxt};border-radius:4px;padding:2px 5px;font-size:9px;font-weight:700">${stLabel}</span>
            <button onclick="removeNota(${n.id})" style="background:none;border:none;cursor:pointer;color:#cbd5e1;font-size:12px;padding:0 1px">✕</button>
          </span>
        </div>`;
      }).join('')}
      <div class="panel-foot">
        <div class="ft slate"><div class="k">Solicitado</div><div class="v">${fmt(deudaInicial)}</div></div>
        <div class="ft blue"><div class="k">Saldo total</div><div class="v">${fmt(cur?cur.deudaIni:deudaInicial)}</div></div>
        <div class="ft green"><div class="k">Liquidado</div><div class="v">${fmt(deudaInicial-(cur?cur.deudaIni:deudaInicial))}</div></div>
      </div>
    </div>

    <div class="panel">
      <h3>💸 Abono extra <span class="badge-tip">Acelera tu liquidación</span></h3>
      <div class="frow"><label>Mes:</label>
        <select id="sel-mes" style="flex:1">
          ${rows.slice(Math.max(0,nxt)).map(r=>`<option value="${r.mes}">${fmtD(r.fecha)} — pago #${r.mes}</option>`).join('')}
        </select>
      </div>
      <div class="frow"><label>Monto:</label>
        <input type="number" id="inp-libre" placeholder="ej. 2000" step="1000" min="1000" style="flex:1">
        <span style="font-size:11px;color:#94a3b8;white-space:nowrap">múlt $1,000</span>
      </div>
      <button class="btn btn-p btn-sm" onclick="addLibre()">Aplicar abono</button>
      ${Object.entries(S.ov).filter(([,v])=>v.libre>0).length>0?`
      <div style="margin-top:10px;padding-top:8px;border-top:1px solid #f1f5f9">
        <div style="font-size:11px;color:#64748b;margin-bottom:6px;font-weight:600">Abonos libres aplicados:</div>
        ${Object.entries(S.ov).filter(([,v])=>v.libre>0).map(([mes,v])=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:3px 0;font-size:12px">
            <span style="color:#475569">Mes ${mes} · ${fmtD(rows[parseInt(mes)-1]?.fecha||S.fechaInicio)}</span>
            <span style="display:flex;align-items:center;gap:6px">
              <span style="font-weight:600;color:#9d174d">${fmt(v.libre)}</span>
              <button onclick="editLibre(${mes})" class="btn btn-sm" style="padding:2px 7px;font-size:10px;background:#fef3c7;border:1px solid #fcd34d;color:#92400e">✏️</button>
              <button onclick="borrarLibre(${mes})" class="btn btn-sm" style="padding:2px 7px;font-size:10px;background:#fee2e2;border:1px solid #fca5a5;color:#dc2626">✕</button>
            </span>
          </div>`).join('')}
      </div>`:''}
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid #f1f5f9;font-size:11px;color:#94a3b8">
        Solo meses actuales o futuros · Trimestrales automáticos en meses 3, 6, 9…
      </div>
    </div>

    <div class="panel">
      <h3>📈 Mi avance <span class="meta">Actualizado hoy</span></h3>
      ${(()=>{
        const totalAbonado = deudaInicial - (cur?cur.deudaIni:deudaInicial);
        const pct = deudaInicial>0?Math.round(totalAbonado/deudaInicial*100):0;
        const ahoAcum = cur?cur.ahoDisp:0;
        const proximoLimite = cur?`01–10 de ${MONTHS[cur.fecha.getMonth()]} ${cur.fecha.getFullYear()}`:'—';
        const mesesRest = nmeses - nPagados;
        return `
        <div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:4px">
            <span>Progreso de liquidación</span><span style="font-weight:700;color:#2563eb">${pct}%</span>
          </div>
          <div style="background:#e2e8f0;border-radius:99px;height:8px">
            <div style="background:#2563eb;border-radius:99px;height:8px;width:${pct}%;transition:.3s"></div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:7px;font-size:12px">
          <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f1f5f9">
            <span style="color:#64748b">Ventana próximo pago</span>
            <span style="font-weight:600;color:#dc2626">${proximoLimite}</span>

          <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f1f5f9">

            <span style="font-weight:600;display:flex;align-items:center;gap:6px">
              <span class="pay-dots" id="payDots" style="--total:${nmeses}"></span>
              ${nPagados}<span style="color:#94a3b8;font-weight:500"> / ${nmeses}</span>
            </span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f1f5f9">
            <span style="color:#64748b">Meses restantes</span>
            <span style="font-weight:600;color:#2563eb">${mesesRest}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f1f5f9">

            <span style="font-weight:600;color:#059669">${fmt(ahoAcum)}</span>

  <div class="tw">

  </div>
  <table>
    <thead><tr>

      <th class="col-num">Pago extra</th>

          <td>${fmt(yrPagos*S.pagoFijo)}</td>
          <td style="color:#dc2626">${fmt(yrInt)}</td>
          <td>${yrExtra>0?fmt(yrExtra):'—'}</td>
          <td>—</td><td>—</td>
          <td style="color:#2563eb">${fmt(yrDeudaFin)}</td>
          <td style="color:#065f46">${yrAho>0?fmt(yrAho):'—'}</td>
          <td style="color:#2563eb">${fmt(yrDeudaFin)}</td><td></td>
        </tr>`;
        yrInt=0;yrExtra=0;yrAho=0;yrLibre=0;yrPagos=0;yrDeudaFin=0;
      }
      curYr=yr; yrNum++;
      const yLabel=yrNum===1?'1er año':yrNum===2?'2do año':yrNum===3?'3er año':`${yrNum}° año`;
      h+=`<tr><td colspan="11" class="yr-hdr">${yLabel} — ${yr}</td></tr>`;
    }
    yrInt+=r.interes; yrExtra+=r.trim+r.libre; yrAho+=r.pxAhorro; yrLibre+=r.libre; yrPagos++; yrDeudaFin=r.deudaFin;
    const bg=yBg[(yrNum-1)%yBg.length];
    const isNxt=i===nxt, isPaid=r.pagado;
    const cls=isPaid?'paid':isNxt?'nxt':'';
    const rowBg=isPaid?'':isNxt?'':bg;
    const triBadge=r.trim>0?`<span class="badge bt">T</span>`:'';
    const libBadge=r.libre>0?`<span class="badge bl">L</span>`:'';
    const ahoBadge=r.pxAhorro>0?`<span class="badge ba">A</span>`:'';
    const pagoExtra=(r.trim+r.libre)>0?fmt(r.trim+r.libre)+(triBadge+libBadge):'—';
    h+=`<tr class="${cls}" style="${rowBg?'background:'+rowBg:''}">
      <td>${isNxt?'▶ ':''}${fmtD(r.fecha)}</td>
      <td>pago ${r.mes}</td>
      <td>${fmt(S.pagoFijo)}</td>
      <td style="color:#dc2626">${fmt(r.interes)}</td>
      <td>${pagoExtra}</td>
      <td style="color:#059669">${r.ahoMes>0?fmt(r.ahoMes):'—'}</td>
      <td>${fmt(r.ahoDisp)}</td>
      <td style="font-weight:600">${fmt(r.deudaIni)}</td>
      <td style="color:#065f46">${r.pxAhorro>0?fmt(r.pxAhorro)+ahoBadge:'—'}</td>
      <td style="font-weight:600;color:${r.deudaFin===0?'#16a34a':'#2563eb'}">${r.deudaFin===0?'✓ $0':fmt(r.deudaFin)}</td>
      <td><button onclick="togglePagado(${r.mes})" class="btn btn-sm" style="background:${isPaid?'#dcfce7':'#f1f5f9'};border:1px solid ${isPaid?'#86efac':'#d1d5db'};color:${isPaid?'#15803d':'#374151'}">${isPaid?'✓ Pagado':'Marcar'}</button></td>
    </tr>`;
  });

  // subtotal del último año
  if(yrPagos>0){
    h+=`<tr style="background:#e2e8f0;font-weight:600;font-size:12px;color:#334155">
      <td colspan="2" style="text-align:left;padding:5px 8px">Subtotal ${curYr} · ${yrPagos} pagos</td>
      <td>${fmt(yrPagos*S.pagoFijo)}</td>
      <td style="color:#dc2626">${fmt(yrInt)}</td>
      <td>${yrExtra>0?fmt(yrExtra):'—'}</td>
      <td>—</td><td>—</td>
      <td style="color:#16a34a">${fmt(yrDeudaFin)}</td>
      <td style="color:#065f46">${yrAho>0?fmt(yrAho):'—'}</td>
      <td style="color:#16a34a">${fmt(yrDeudaFin)}</td><td></td>
    </tr>`;
  }

  const totExtra=rows.reduce((s,r)=>s+r.trim+r.libre,0);
  const totAhoMes=rows.reduce((s,r)=>s+r.ahoMes,0);
  h+=`<tr class="totals">
    <td colspan="2">Totales · ${nmeses} pagos</td>
    <td>—</td>
    <td>${fmt(totInt)}</td>
    <td>${fmt(totExtra)}</td>
    <td>${fmt(totAhoMes)}</td>
    <td>—</td>
    <td>—</td>
    <td>${fmt(totAho)}</td>
    <td style="color:#86efac">$0</td>
    <td></td>
  </tr>`;

  h+=`</tbody></table></div>

  <div style="background:#1e3a5f;color:#fff;padding:14px 20px;margin:0 20px 24px;border-radius:8px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;font-size:12px">
    <div><div style="font-size:10px;opacity:.7;margin-bottom:3px">FECHA DE LIQUIDACIÓN</div><div style="font-size:15px;font-weight:700;color:#86efac">${last?fmtDLong(last.fecha):'—'}</div></div>
    <div><div style="font-size:10px;opacity:.7;margin-bottom:3px">TOTAL INTERESES PAGADOS</div><div style="font-size:15px;font-weight:700;color:#fca5a5">${fmt(totInt)}</div></div>
    <div><div style="font-size:10px;opacity:.7;margin-bottom:3px">TOTAL CAPITAL ABONADO</div><div style="font-size:15px;font-weight:700">${fmt(totCap)}</div><div style="opacity:.6;font-size:10px">T:${fmt(totTrim)} · A:${fmt(totAho)} · L:${fmt(totLibre)}</div></div>
    <div><div style="font-size:10px;opacity:.7;margin-bottom:3px">TOTAL DESEMBOLSADO</div><div style="font-size:15px;font-weight:700">${fmt(totDes)}</div><div style="opacity:.6;font-size:10px">${anios?anios+' años ':''} ${mResto} meses</div></div>
  </div>`;

  $('app').innerHTML=h;
  $('modal').innerHTML=`
    <div class="modal">
      <h3>➕ Agregar nueva nota</h3>
      <div class="frow"><label>Nombre</label><input type="text" id="m-nombre" value="Nota ${S.nid}"></div>
      <div class="frow"><label>Monto</label><input type="number" id="m-monto" placeholder="ej. 10000" step="1000" min="1000"></div>
      <div class="frow"><label>Fecha solicitud</label><input type="date" id="m-fecha" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="frow"><label>Inicia mes #</label><input type="number" id="m-smes" value="${Math.max(1,nxt+1)}" min="1"><span style="font-size:11px;color:#94a3b8;margin-left:6px">Mes 1 = ${fmtD(S.fechaInicio)}</span></div>
      <p id="m-err" style="color:#dc2626;font-size:11px;min-height:14px;margin-bottom:8px"></p>
      <div style="display:flex;gap:8px">
        <button class="btn btn-p" style="flex:1" onclick="confirmNota()">Agregar</button>
        <button class="btn btn-s" style="flex:1" onclick="closeModal()">Cancelar</button>
      </div>
    </div>`;
}

function togglePagado(mes){
  if(!S.ov[mes]) S.ov[mes]={};
  S.ov[mes].pagado=!S.ov[mes].pagado;
  render(); saveState();
}

function addLibre(){
  const mes=parseInt($('sel-mes').value);
  const m=parseInt($('inp-libre').value);
  if(!m||m<1000||m%1000!==0){alert('El monto debe ser múltiplo de $1,000 (mínimo $1,000)');return;}
  if(!S.ov[mes]) S.ov[mes]={};
  S.ov[mes].libre=(S.ov[mes].libre||0)+m;
  render(); saveState();
}

function borrarLibre(mes){
  if(!confirm('¿Eliminar este abono libre?'))return;
  if(S.ov[mes]) S.ov[mes].libre=0;
  render(); saveState();
}

function editLibre(mes){
  const actual=(S.ov[mes]||{}).libre||0;
  const nuevo=prompt(`Editar abono del mes ${mes}. Monto actual: $${actual.toLocaleString()}\nNuevo monto (múltiplo de $1,000):`);
  if(nuevo===null)return;
  const n=parseInt(nuevo);
  if(!n||n<0||n%1000!==0){alert('Debe ser múltiplo de $1,000 o 0 para eliminar.');return;}
  if(!S.ov[mes])S.ov[mes]={};
  S.ov[mes].libre=n;
  render(); saveState();
}

function removeNota(id){
  if(S.notas.length<=1){alert('Debe quedar al menos una nota.');return;}
  if(!confirm('¿Eliminar esta nota?'))return;
  S.notas=S.notas.filter(n=>n.id!==id);
  render();
}

function openModal(){$('modal').classList.add('show')}
function closeModal(){$('modal').classList.remove('show')}

function cerrarSesion(){
  if(!confirm('¿Cerrar sesión? Tendrás que ingresar tu PIN de nuevo.'))return;
  $('app').style.display='none';
  $('pin-screen').style.display='flex';
  pinVal=''; updateDots();
  $('pin-sub').textContent='Ingresa tu PIN para continuar';
  $('pin-err').textContent='';
}

function reiniciar(){
  if(!confirm('¿Borrar todo y empezar desde cero?'))return;
  S={notas:[],pagoFijo:2550,trimBase:1000,fechaInicio:new Date(2026,5,1),ov:{},nid:1};
  render(); saveState();
}

function confirmNota(){
  const nombre=($('m-nombre').value||'').trim()||`Nota ${S.nid}`;
  const monto=parseInt($('m-monto').value);
  const smes=parseInt($('m-smes').value)||1;
  const fechaSol=$('m-fecha')?$('m-fecha').value:'';
  if(!monto||monto<1000||monto%1000!==0){$('m-err').textContent='El monto debe ser múltiplo de $1,000';return;}
  S.notas.push({id:S.nid,nombre,monto,startMes:smes,fechaSol});
  S.nid++;
  closeModal();
  render(); saveState();
}

function updateClock(){
  const el=$('clock');
  if(!el)return;
  el.textContent='🇲🇽 '+new Date().toLocaleString('es-MX',{timeZone:MX_TZ,day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,30000);

// ── Autosave a Firebase ──────────────────────────────────
function saveState(){
  const data={...S,fechaInicio:S.fechaInicio.toISOString()};
  localStorage.setItem('prest_state',JSON.stringify(data));
  if(window._fbSave) window._fbSave(data);
  setTimeout(renderPayDots,50);
}
// ── Carga estado ─────────────────────────────────────────
function applyState(data){
  if(!data)return;
  S.pagoFijo=data.pagoFijo||2550;
  S.trimBase=data.trimBase||1000;
  S.fechaInicio=data.fechaInicio?new Date(data.fechaInicio):new Date(2026,5,1);
  S.notas=data.notas||[];
  S.ov=data.ov||{};
  S.nid=data.nid||1;
}

// ── Sistema PIN ──────────────────────────────────────────
const SALT='prest_2026';
async function hashPin(pin){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pin+SALT));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16);
}

let pinVal='', pinMode='enter'; // 'enter' | 'create'

async function initApp(){
  $('pin-screen').style.display='flex';
  // Intentar cargar desde Firebase primero, luego localStorage
  let state=null;
  const waitFb=()=>new Promise(res=>{
    if(window._fbReady){res();return;}
    document.addEventListener('fbReady',res,{once:true});
    setTimeout(res,4000);
  });
  await waitFb();
  if(window._fbLoad) state=await window._fbLoad();
  if(!state){
    const local=localStorage.getItem('prest_state');
    if(local) state=JSON.parse(local);
  }
  if(state) applyState(state);

  const storedHash=localStorage.getItem('prest_pin');
  if(!storedHash){
    pinMode='create';
    $('pin-sub').textContent='Crea tu PIN de 4 dígitos';
  } else {
    pinMode='enter';
    $('pin-sub').textContent='Ingresa tu PIN para continuar';
  }
}

window.pinKey=async function(k){
  if(k===''){return;}
  if(k==='⌫'){pinVal=pinVal.slice(0,-1);updateDots();return;}
  if(pinVal.length>=4)return;
  pinVal+=k;
  updateDots();
  if(pinVal.length===4) await checkPin();
};

function updateDots(){
  for(let i=0;i<4;i++){
    const d=$('d'+i);
    if(d){d.classList.toggle('filled',i<pinVal.length);}
  }
}

let firstPin='';
async function checkPin(){
  const h=await hashPin(pinVal);
  if(pinMode==='create'){
    if(!firstPin){
      firstPin=pinVal; pinVal='';
      $('pin-sub').textContent='Confirma tu PIN';
      updateDots(); return;
    }
    if(pinVal===firstPin){
      localStorage.setItem('prest_pin',h);
      unlock();
    } else {
      $('pin-err').textContent='Los PINs no coinciden. Intenta de nuevo.';
      pinVal=''; firstPin=''; updateDots();
      $('pin-sub').textContent='Crea tu PIN de 4 dígitos';
    }
  } else {
    const stored=localStorage.getItem('prest_pin');
    if(h===stored){ unlock(); }
    else {
      $('pin-err').textContent='PIN incorrecto. Intenta de nuevo.';
      pinVal=''; updateDots();
      const dotsEl=$('pin-dots');
      dotsEl.classList.add('error');
      setTimeout(()=>{dotsEl.classList.remove('error');if($('pin-err'))$('pin-err').textContent='';},2000);
    }
  }
}

function unlock(){
  $('pin-screen').style.display='none';
  $('app').style.display='block';
  render();
  renderPayDots();
}

function renderPayDots(){
  const el=document.getElementById('payDots');
  if(!el)return;
  const rows=calcular();
  const np=rows.filter(r=>r.pagado).length;
  const total=rows.length;
  el.style.setProperty('--total',total);
  el.innerHTML='';
  for(let i=0;i<total;i++){const seg=document.createElement('i');if(i<np)seg.className='on';el.appendChild(seg);}
}

initApp();
</script>
